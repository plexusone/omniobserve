site_name: OmniObserve
site_description: Unified Go library for observability - LLM tracing and app metrics/traces/logs
site_url: https://plexusone.github.io/omniobserve
repo_url: https://github.com/plexusone/omniobserve
repo_name: plexusone/omniobserve

theme:
  name: material
  palette:
    - scheme: default
      primary: deep-purple
      accent: deep-purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep-purple
      accent: deep-purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Configuration: getting-started/configuration.md
  - LLM Providers:
      - Overview: providers/index.md
      - Opik: providers/opik.md
      - Langfuse: providers/langfuse.md
      - Phoenix: providers/phoenix.md
      - slog: providers/slog.md
  - App Observability (observops):
      - OTLP: providers/otlp.md
      - Datadog: providers/datadog.md
      - New Relic: providers/newrelic.md
      - Dynatrace: providers/dynatrace.md
      - sloghandler: providers/sloghandler.md
  - Features:
      - Tracing: features/tracing.md
      - Evaluation Metrics: features/metrics.md
      - Datasets: features/datasets.md
      - Prompts: features/prompts.md
  - Integrations:
      - OmniLLM: integrations/omnillm.md
      - Structured Evaluation: integrations/sevaluation.md
  - Architecture: architecture.md
  - Guides:
      - Stats Agent Observability: guides/integration-guide-stats-agent-team.md
  - API Reference: https://pkg.go.dev/github.com/plexusone/omniobserve
  - Releases:
      - Changelog: releases/changelog.md
      - v0.8.0: releases/v0.8.0.md
      - v0.7.0: releases/v0.7.0.md
      - v0.6.0: releases/v0.6.0.md
      - v0.5.0: releases/v0.5.0.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/plexusone/omniobserve
